name: Deploy Frontend

# Single-job build + deploy through this project's deploy.sh wrapper.
#
# Production (push to main / manual dispatch) deploys to the Summit network at a
# fixed DotNS domain so installed hosts and shared links stay stable across
# releases. PR previews ALSO deploy to Summit (PCF CI is Summit-only — never
# Paseo) and get a pr<N>- prefix on the same base name.
#
# Deploy CLI: @polkadot-community-foundation/polkadot-app-deploy@0.12.1 — it
# ships the built-in `summit` env. deploy.sh passes --mnemonic (direct signer),
# --config, --js-merkle and --no-transfer-to-signedin-user.
#
# The W3SPayRegistry is a CONTRACT leg: it must be deployed on Summit (manually,
# from the deployer VM — see contracts/ + the dossier) BEFORE this workflow can
# publish a Summit build. deploy.sh enforces a valid VITE_W3SPAY_REGISTRY_ADDRESS,
# so a Summit run fails fast until the repo variable below is set.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip-cache:
        description: 'Force redeploy (skip cache)'
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: deploy-admin-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        # npm bug #4828: lockfiles generated on macOS can omit Linux optional
        # native packages. Resolve fresh on the runner so Rollup/PAPI native
        # packages are present for this platform.
        run: |
          rm -f package-lock.json
          npm install --no-audit --no-fund

      - name: Install deploy tool
        run: npm install -g @polkadot-community-foundation/polkadot-app-deploy@0.12.1

      - name: Resolve deploy target
        id: target
        run: |
          # PCF CI is Summit-only: every branch (incl. PR previews) targets
          # Summit using the SAME Summit registry/t3rminal addresses. No path
          # ever sets paseo-next-v2.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "domain=pr${{ github.event.pull_request.number }}-w3spayadmin.dot" >> "$GITHUB_OUTPUT"
          else
            echo "domain=w3spayadmin.dot" >> "$GITHUB_OUTPUT"
          fi
          echo "env=summit" >> "$GITHUB_OUTPUT"
          # Summit W3SPayRegistry address. REQUIRED — set the repo variable
          # VITE_W3SPAY_REGISTRY_ADDRESS_SUMMIT once the registry has been
          # deployed on Summit AH (npm run deploy:summit --prefix contracts).
          # deploy.sh refuses to ship a build without a valid H160 here.
          echo "registry=${{ vars.VITE_W3SPAY_REGISTRY_ADDRESS_SUMMIT }}" >> "$GITHUB_OUTPUT"
          # Reports surface — live Summit T3rminalBulletinIndex (ownerless,
          # writes permissionless). Override/clear via the repo variable.
          echo "t3rminal=${{ vars.VITE_T3RMINAL_BULLETIN_INDEX_ADDRESS_SUMMIT || '0x10acbce7ea2fb859ef7c2caab29c0babb8b91803' }}" >> "$GITHUB_OUTPUT"

      - name: Check Summit registry is configured
        run: |
          if [ -z "${{ steps.target.outputs.registry }}" ]; then
            echo "::error::VITE_W3SPAY_REGISTRY_ADDRESS_SUMMIT repo variable is empty."
            echo "Deploy the W3SPayRegistry on Summit first (see contracts/ + dossier),"
            echo "then set the repo variable to its H160 address and re-run."
            exit 1
          fi

      - name: Deploy admin app
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 30
          command: ./deploy.sh "${{ steps.target.outputs.domain }}"
        env:
          # On Summit this MUST be the Bulletin-authorized uploader (e.g. 5Fk8…)
          # that owns w3spayadmin.dot — it signs both the Bulletin upload and
          # the DotNS bind. All deploys (incl. PR previews) target Summit.
          MNEMONIC: ${{ secrets.DOTNS_MNEMONIC }}
          BULLETIN_ENV: ${{ steps.target.outputs.env }}
          VITE_NETWORK: ${{ steps.target.outputs.env }}
          VITE_W3SPAY_REGISTRY_ADDRESS: ${{ steps.target.outputs.registry }}
          VITE_T3RMINAL_BULLETIN_INDEX_ADDRESS: ${{ steps.target.outputs.t3rminal }}
          NODE_OPTIONS: '--max-old-space-size=8192'


      - name: Comment on PR
        if: github.event.pull_request
        uses: actions/github-script@v7
        with:
          script: |
            const domain = `pr${{ github.event.pull_request.number }}-w3spayadmin`;
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `**${domain}.dot** (Summit preview) · [logs](${runUrl})\n\nhttps://${domain}.dot.li`
            });
